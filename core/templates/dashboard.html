{% extends 'base.html' %} {% block content %}
<h1 class="text-3xl font-bold mb-6 text-gray-800">Métricas Financeiras</h1>

<div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
  <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-200">
    <h3 class="text-gray-500 text-sm font-medium">Entradas</h3>
    <p class="text-2xl font-bold text-green-600">
      R$ {{ credits|floatformat:2 }}
    </p>
  </div>
  <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-200">
    <h3 class="text-gray-500 text-sm font-medium">Saídas</h3>
    <p class="text-2xl font-bold text-red-600">R$ {{ debits|floatformat:2 }}</p>
  </div>
  <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-200">
    <h3 class="text-gray-500 text-sm font-medium">Saldo Atual</h3>
    <p class="text-2xl font-bold text-slate-800">
      R$ {{ balance|floatformat:2 }}
    </p>
  </div>
  <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-200">
    <h3 class="text-gray-500 text-sm font-medium">Taxa de Estorno</h3>
    <p class="text-2xl font-bold text-orange-500">
      {{ reversal_rate|floatformat:1 }}%
    </p>
  </div>
</div>

<div
  class="bg-white p-6 rounded-lg shadow-sm border border-gray-200 w-full md:w-2/3"
>
  <h3 class="font-bold mb-4 text-gray-700">Fluxo (Visualização)</h3>
  <canvas id="financeChart"></canvas>
</div>

<script>
  const ctx = document.getElementById("financeChart");
  new Chart(ctx, {
    type: "bar",
    data: {
      labels: ["Semana 1", "Semana 2", "Semana 3", "Semana 4"],
      datasets: [
        {
          label: "Crédito",
          data: [1200, 1900, 3000, 500],
          backgroundColor: "#16a34a",
        },
        {
          label: "Débito",
          data: [500, 200, 1000, 1200],
          backgroundColor: "#dc2626",
        },
      ],
    },
  });
</script>
{% endblock %}
