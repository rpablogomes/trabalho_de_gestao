<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>FinAudit - Auditoria Financeira</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body class="bg-gray-50 text-gray-900 font-sans">
    {% if user.is_authenticated %}
    <nav
      class="bg-slate-900 text-white p-4 shadow-md flex justify-between items-center"
    >
      <div class="font-bold text-xl tracking-tight">FinAudit</div>
      <div class="flex gap-4 items-center">
        <a href="{% url 'dashboard' %}" class="hover:text-gray-300"
          >Dashboard</a
        >
        <a href="{% url 'operations' %}" class="hover:text-gray-300"
          >Operações</a
        >
        <span class="text-gray-400 text-sm border-l border-gray-600 pl-4">
          {{ user.name }} ({{ user.role }})
        </span>
        <form action="{% url 'logout' %}" method="post" class="inline">
          {% csrf_token %}
          <button
            type="submit"
            class="bg-red-600 px-3 py-1 rounded text-sm font-semibold hover:bg-red-700"
          >
            Sair
          </button>
        </form>
      </div>
    </nav>
    {% endif %}

    <main class="container mx-auto p-6">
      {% if messages %} {% for message in messages %}
      <div
        class="p-4 mb-4 rounded shadow-sm text-sm {% if message.tags == 'error' %}bg-red-100 text-red-800{% else %}bg-green-100 text-green-800{% endif %}"
      >
        {{ message }}
      </div>
      {% endfor %} {% endif %} {% block content %}{% endblock %}
    </main>
  </body>
</html>
